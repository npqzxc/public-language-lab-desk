<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar"><h1>Language Lab Desk</h1><nav><a href="/">仪表盘</a><a href="/records">列表</a><a href="/create">新建</a></nav></header>
    <main class="shell">
      <section class="panel">
        <h2>记录列表</h2>
        <ul class="record-list">
          {% for item in records %}
          <li><strong>{{ item.title }}</strong><span>{{ item.owner }} / {{ item.status }}</span></li>
          {% endfor %}
        </ul>
      </section>
    </main>
  </body>
</html>
